{% extends "base.html" %}

{% block content %}
  <div class="container">
    <h2>Delete Graduate</h2>
    <p>Are you sure you want to delete the graduate account for {{ graduate.user.username }}?</p>
    <p>This action cannot be undone.</p>

    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Confirm Deletion</button>
      <a href="{% url 'home' %}" class="btn btn-secondary">Cancel</a>
    </form>
  </div>
{% endblock %}
