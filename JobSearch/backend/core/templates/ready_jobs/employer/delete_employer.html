{% extends "base.html" %}

{% block title %}Delete Employer{% endblock %}

{% block content %}
<h2>Are you sure you want to delete this employer?</h2>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
</form>

<a href="{% url 'view_employer' employer.id %}">Cancel</a>
{% endblock %}
