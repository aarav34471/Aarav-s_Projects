{% extends "base.html" %}

{% block title %}Create Mentor Account{% endblock %}

{% block content %}
    <h1>Create a New Mento Account</h1>
    {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <l1{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}></l1>
            {% endfor %}
        </ul>
    {% endif %}    

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Create Mentor Account</button>
    </form>

    <a href="{%url 'home'%}">Back to Home</a>
{% endblock %}
