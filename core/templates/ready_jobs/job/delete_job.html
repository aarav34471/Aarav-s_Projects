{% extends "base.html" %}

{% block title %}Delete Job{% endblock %}

{% block content %}
<h2>Delete Job</h2>

<p>Are you sure you want to delete the job <strong>{{ job.title }}</strong>?</p>
<p>This action cannot be undone.</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
    <a href="{% url 'view_jobs' %}">Cancel</a>
</form>
{% endblock %}
