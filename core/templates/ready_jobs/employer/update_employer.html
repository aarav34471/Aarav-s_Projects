{% extends "base.html" %}

{% block title %}Update Employer{% endblock %}

{% block content %}
<h2>Update Employer</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save Changes</button>
</form>

<a href="{% url 'view_employer' employer.id %}">Cancel</a>
{% endblock %}
